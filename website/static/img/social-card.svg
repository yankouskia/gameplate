<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0a14"/>
      <stop offset="50%" stop-color="#14112a"/>
      <stop offset="100%" stop-color="#1c0f33"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#ff5277"/>
      <stop offset="100%" stop-color="#f8b400"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="260" rx="540" ry="220" fill="url(#glow)"/>
  <g opacity="0.16" stroke="#a78bfa" stroke-width="1">
    <path d="M0 100 H1200 M0 200 H1200 M0 300 H1200 M0 400 H1200 M0 500 H1200" />
    <path d="M150 0 V630 M300 0 V630 M450 0 V630 M600 0 V630 M750 0 V630 M900 0 V630 M1050 0 V630" />
  </g>
  <g transform="translate(90,140)">
    <rect width="60" height="60" rx="14" fill="url(#brand)"/>
    <circle cx="22" cy="32" r="4" fill="#0b0a14"/>
    <circle cx="38" cy="32" r="4" fill="#0b0a14"/>
    <path d="M18 42 Q30 52 42 42" stroke="#0b0a14" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  <text x="170" y="195" font-family="ui-sans-serif, system-ui, sans-serif" font-size="44" font-weight="800" fill="#ddd6fe">gameplate</text>
  <text x="90" y="320" font-family="ui-sans-serif, system-ui, sans-serif" font-size="74" font-weight="800" fill="#ffffff" letter-spacing="-1">Tiny TypeScript</text>
  <text x="90" y="404" font-family="ui-sans-serif, system-ui, sans-serif" font-size="74" font-weight="800" fill="url(#brand)" letter-spacing="-1">framework for games.</text>
  <text x="90" y="470" font-family="ui-sans-serif, system-ui, sans-serif" font-size="28" fill="#a5b4fc">Zero deps · ~3 KB gzipped · Browser &amp; Node · Renderer-agnostic</text>
  <g transform="translate(90,530)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#94a3b8">
    <rect x="0" y="-26" width="320" height="44" rx="10" fill="rgba(167,139,250,0.12)" stroke="rgba(167,139,250,0.35)"/>
    <text x="16" y="2">$ npm install gameplate</text>
  </g>
  <g transform="translate(800,150)" opacity="0.85">
    <rect x="0" y="0" width="320" height="320" rx="22" fill="#0b0a14" stroke="rgba(167,139,250,0.35)"/>
    <g transform="translate(20,40)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#cbd5e1">
      <text y="0" fill="#a78bfa">import</text><text x="50" y="0">{ createGame } </text><text y="0" x="190" fill="#a78bfa">from</text><text y="0" x="240" fill="#fde68a">'gameplate'</text>
      <text y="34">const game = createGame({</text>
      <text y="58" x="20">state, actions,</text>
      <text y="82" x="20">update: (s, dt, actions) =&gt; ...</text>
      <text y="106" x="20">render: (s, alpha) =&gt; draw(s),</text>
      <text y="130">});</text>
      <text y="170">game.start();</text>
      <text y="220" fill="#22c55e">✓ typecheck</text>
      <text y="244" fill="#22c55e">✓ test (94% cov)</text>
      <text y="268" fill="#22c55e">✓ bundle &lt; 4 KB</text>
    </g>
  </g>
</svg>
