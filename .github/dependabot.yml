version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '07:00'
    open-pull-requests-limit: 10
    versioning-strategy: increase-if-necessary
    groups:
      types:
        patterns:
          - '@types/*'
      eslint:
        patterns:
          - 'eslint*'
          - 'typescript-eslint'
          - '@typescript-eslint/*'
      vitest:
        patterns:
          - 'vitest*'
          - '@vitest/*'
      build:
        patterns:
          - 'tsup'
          - 'typescript'
          - 'typedoc*'
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - '*'
    labels:
      - ci
